name: secure-vault
services:
  - name: backend
    source_dir: backend
    dockerfile_path: Dockerfile
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: VAULT_ADDR
        scope: RUN_TIME
        value: http://localhost:8200
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs

  - name: frontend
    source_dir: frontend
    dockerfile_path: Dockerfile
    envs:
      - key: REACT_APP_API_URL
        scope: RUN_TIME
        value: ${backend.PUBLIC_URL}
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs

databases:
  - name: db
    engine: PG
    version: "15"
    size: db-s-dev-database
